{% extends 'base.html' %}

{% block content %}
<div class="container animate__animated animate__fadeIn text-center my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card-premium p-5 shadow-lg my-4">
                <i class="bi bi-exclamation-triangle text-warning display-1 mb-3 animate__animated animate__bounce"></i>
                <h1 class="display-4 fw-bold text-primary mb-2">404</h1>
                <h3 class="fw-bold text-primary mb-3">Page Not Found</h3>
                <p class="text-secondary mb-4">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
                <a href="{{ url_for('main.home') }}" class="btn btn-premium px-4 py-2 w-100">
                    <i class="bi bi-house-door me-2"></i>Return to Homepage
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
